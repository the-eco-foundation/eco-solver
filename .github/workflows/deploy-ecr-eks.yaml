name: Build Push to Amazon ECR and EKS

on:
  push:
    branches:
      - release-staging

jobs:
  deploy:
    uses: eco/workflows/.github/workflows/deploy-to-eks.yml@v20231102
    with:
      appname: solver-staging
      assumed-role: arn:aws:iam::027715947294:role/solver-eks-actions-bend-staging
      aws-region: us-east-2
      ecr-repository: eco-solver
      ghenv: staging
      ghsha: 3054dfde37a20fa16fd4e8816b751fbf47360a6b
      targetenv: staging
